# SonarCloud Configuration
sonar.projectKey=link-it_govpay-maggioli-jppa
sonar.organization=link-it

# Project metadata
sonar.projectName=GovPay Maggioli JPPA Batch
sonar.projectVersion=0.0.1

# Source and test directories
sonar.sources=src/main/java
sonar.tests=src/test/java

# Java version
sonar.java.source=21
sonar.java.binaries=target/classes
sonar.java.libraries=target/dependency

# Code coverage
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.coverage.exclusions=**/test/**,**/*Test*.java,**/generated-sources/**

# Exclude generated code from analysis
sonar.exclusions=**/target/generated-sources/**

# Encoding
sonar.sourceEncoding=UTF-8
